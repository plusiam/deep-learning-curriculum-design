<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>깊이 있는 학습 설계 연수</title>
    <style>
        /* ============================================================
           DESIGN SYSTEM — 가독성 최우선 리디자인
           원칙: 넉넉한 여백, 절제된 색상, 명확한 위계, 큰 글씨
           ============================================================ */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css');

        :root {
            /* 색상: 3색 체계 — 주색 + 보조색 + 강조색만 */
            --ink: #1a202c;
            --ink-secondary: #4a5568;
            --ink-muted: #a0aec0;
            --surface: #ffffff;
            --surface-dim: #f7f8fa;
            --surface-hover: #edf2f7;
            --border: #e2e8f0;
            --accent: #4f46e5;       /* 인디고 — 주 강조 */
            --accent-soft: #eef2ff;
            --accent-medium: #c7d2fe;
            --teal: #0d9488;          /* 틸 — 보조 강조 */
            --teal-soft: #f0fdfa;
            --amber: #d97706;         /* 앰버 — 포인트 */
            --amber-soft: #fffbeb;
            --rose: #e11d48;
            --rose-soft: #fff1f2;

            /* 타이포: 발표용 큰 스케일 */
            --font: 'Pretendard Variable', -apple-system, 'Noto Sans KR', sans-serif;
            --fs-hero: clamp(2rem, 4vw, 3rem);
            --fs-h2: clamp(1.5rem, 2.5vw, 2rem);
            --fs-h3: clamp(1.15rem, 2vw, 1.45rem);
            --fs-h4: clamp(1rem, 1.5vw, 1.15rem);
            --fs-body: clamp(1rem, 1.3vw, 1.1rem);
            --fs-small: clamp(0.85rem, 1.1vw, 0.95rem);

            /* 간격 */
            --space-xs: 8px;
            --space-sm: 16px;
            --space-md: 24px;
            --space-lg: 40px;
            --space-xl: 64px;
            --space-2xl: 96px;

            --radius: 12px;
            --radius-lg: 20px;
